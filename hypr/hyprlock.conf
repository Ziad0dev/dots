# ⸸ hyprlock — occult blood red ⸸

general {
    hide_cursor = true
    grace = 5
}

background {
    monitor =
    color = rgb(100000)
    # or use a blurred screenshot instead of flat color:
    # path = screenshot
    # blur_passes = 3
    # blur_size = 6
}

input-field {
    monitor =
    size = 260, 48
    outline_thickness = 1
    dots_size = 0.28
    dots_spacing = 0.3
    outer_color = rgb(8B0000)
    inner_color = rgb(100000)
    font_color = rgb(FFFFFF)
    check_color = rgb(A30000)
    fail_color = rgb(EE5396)
    placeholder_text = <i>...</i>
    fade_on_empty = true
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(8B0000)
    font_size = 72
    font_family = FiraCode Nerd Font Mono
    position = 0, 120
    halign = center
    valign = center
}
