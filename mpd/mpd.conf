# MPD Configuration - Lossless Audio Setup (NixOS)
# State lives in ~/.local/state/mpd so the symlinked config dir stays clean.

# Files and directories
music_directory         "/run/media/ziad0dev/Backup/music/"
playlist_directory      "~/.config/mpd/playlists"
db_file                 "~/.local/state/mpd/database"
log_file                "~/.local/state/mpd/log"
pid_file                "~/.local/state/mpd/pid"
state_file              "~/.local/state/mpd/state"
sticker_file            "~/.local/state/mpd/sticker.sql"

# General settings
bind_to_address         "localhost"
port                    "6600"
auto_update             "yes"
auto_update_depth       "3"

# Disable replaygain for purist lossless
replaygain              "off"

# Buffer settings for smooth lossless playback
audio_buffer_size       "4096"

# ============================================
# AUDIO OUTPUTS - PipeWire
# ============================================

# PipeWire
audio_output {
    type                "pipewire"
    name                "PipeWire Output"
}

# Visualization data (for ncmpcpp visualizer, etc.)
audio_output {
    type                "fifo"
    name                "Visualizer"
    path                "/tmp/mpd.fifo"
    format              "44100:16:2"
}

# Decoder settings
decoder {
    plugin              "flac"
    enabled             "yes"
}

decoder {
    plugin              "ffmpeg"
    enabled             "yes"
}

# Character encoding
filesystem_charset      "UTF-8"
log_level               "default"
